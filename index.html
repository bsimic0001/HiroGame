<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HIRO: Identity Under Siege</title>
<meta name="description" content="A 32-bit identity security RPG starring Hiro the Hedgehog. Hackers don't break in. They log in.">
<style>
  @font-face {
    font-family: 'Rajdhani';
    src: url('assets/fonts/Rajdhani-SemiBold.ttf') format('truetype');
    font-weight: 600;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: radial-gradient(ellipse at 50% 30%, #221542 0%, #120b24 55%, #0a0614 100%);
    overflow: hidden;
    touch-action: none;
    -webkit-user-select: none; user-select: none;
    font-family: 'Rajdhani', sans-serif;
  }
  #stage {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 14px;
  }
  #game {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    background: #000;
    border: 2px solid #3c2a6e;
    border-radius: 4px;
    box-shadow: 0 0 60px rgba(106, 61, 240, 0.25), 0 8px 40px rgba(0, 0, 0, 0.6);
  }
  /* Controls guide (keyboard) */
  #controls {
    display: flex; gap: 22px; flex-wrap: wrap; justify-content: center;
    color: #8d86b8; font-size: 15px; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase;
  }
  #controls span { display: inline-flex; align-items: center; gap: 7px; }
  #controls kbd {
    font-family: inherit; font-size: 13px; color: #d9d2f5;
    background: #1d1535; border: 1px solid #4a3a85; border-bottom-width: 3px;
    border-radius: 5px; padding: 2px 8px; min-width: 26px; text-align: center;
  }
  body.touch #controls { display: none; }
  /* Touch controls */
  #touch { position: absolute; inset: 0; pointer-events: none; display: none; }
  body.touch #touch { display: block; }
  .tbtn {
    position: absolute; pointer-events: auto;
    background: rgba(255,255,255,0.07);
    border: 2px solid rgba(160,120,255,0.45);
    border-radius: 12px;
    color: rgba(220,200,255,0.8);
    font-family: 'Rajdhani', sans-serif; font-weight: 600;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }
  .tbtn:active, .tbtn.held { background: rgba(160,120,255,0.35); }
  #d-up    { left: 74px;  bottom: 118px; width: 56px; height: 56px; }
  #d-down  { left: 74px;  bottom: 6px;   width: 56px; height: 56px; }
  #d-left  { left: 12px;  bottom: 62px;  width: 56px; height: 56px; }
  #d-right { left: 136px; bottom: 62px;  width: 56px; height: 56px; }
  #b-a { right: 16px; bottom: 84px; width: 64px; height: 64px; border-radius: 50%; }
  #b-b { right: 92px; bottom: 16px; width: 56px; height: 56px; border-radius: 50%; }
</style>
</head>
<body>
  <div id="stage">
    <canvas id="game" width="480" height="320"></canvas>
    <div id="controls">
      <span><kbd>&#8592;&#8593;&#8595;&#8594;</kbd>/<kbd>WASD</kbd> Move</span>
      <span><kbd>Z</kbd>/<kbd>Enter</kbd> Confirm &middot; Talk</span>
      <span><kbd>X</kbd>/<kbd>Esc</kbd> Cancel &middot; Menu</span>
      <span><kbd>M</kbd> Sound</span>
    </div>
  </div>
  <div id="touch">
    <div class="tbtn" id="d-up">&#9650;</div>
    <div class="tbtn" id="d-down">&#9660;</div>
    <div class="tbtn" id="d-left">&#9664;</div>
    <div class="tbtn" id="d-right">&#9654;</div>
    <div class="tbtn" id="b-a">A</div>
    <div class="tbtn" id="b-b">B</div>
  </div>
  <script type="module" src="src/main.js"></script>
</body>
</html>
